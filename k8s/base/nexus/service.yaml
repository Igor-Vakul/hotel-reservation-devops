# Service (NodePort) — a stable address for the Nexus pods + ports exposed outside.
# Inside the cluster other pods reach Nexus by the name "nexus". NodePort also gives
# access from outside (via the node address) — needed to push images.

apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: hotel
  labels:
    app: nexus
spec:
  type: NodePort
  selector:
    app: nexus                # which pods to route to — those labelled app=nexus.
  ports:
    - name: ui
      port: 8081              # service port inside the cluster.
      targetPort: 8081        # container port to forward to.
      nodePort: 30081         # port exposed on the node (range 30000-32767): web UI.
    - name: docker
      port: 8082
      targetPort: 8082
      nodePort: 30082         # port exposed on the node for the docker registry.
