# TEMPLATE secret (kept in git). Real values live in secret.yaml (which is .gitignored).
# On a new machine: copy this file to secret.yaml and fill in the real values.
#
# stringData — values in plain text (k8s base64-encodes them for you).
# IMPORTANT: base64 is NOT encryption. A Secret is just a separate object for sensitive data.

apiVersion: v1
kind: Secret
metadata:
  name: hotel-secret
  namespace: hotel
type: Opaque                     # a generic key-value secret.
stringData:
  Jwt__Secret: "<random string, at least 32 characters>"
  Admin__Password: "<bootstrap admin password>"
  # DB connection string. The mysql-primary host is created in P3 (Bitnami MySQL).
  ConnectionStrings__Default: "Server=mysql-primary;Port=3306;Database=hoteldb;User Id=hotel;Password=<db_password>;"
