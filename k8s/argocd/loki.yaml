# ArgoCD Application — logs stack (Loki + Promtail via the loki-stack Helm chart).
# Same pattern as monitoring.yaml: source is a REMOTE HELM CHART, values inline.
# Loki stores logs; Promtail (a DaemonSet) tails every pod's stdout and ships it to Loki.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts   # Helm chart repo, NOT git
    chart: loki-stack
    targetRevision: 2.10.3                            # CHART version, pinned (app v2.9.3)
    helm:
      valuesObject:
        loki:
          enabled: true          # the log store (single-binary, filesystem — fine for minikube)
        promtail:
          enabled: true          # DaemonSet: tails pod stdout on each node, pushes to Loki
        grafana:
          enabled: false         # we already have Grafana from kube-prometheus-stack
        prometheus:
          enabled: false         # we already have Prometheus from kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
