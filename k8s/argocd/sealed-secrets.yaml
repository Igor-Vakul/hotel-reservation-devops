# ArgoCD Application — Sealed Secrets controller (Helm chart, same pattern as monitoring.yaml/loki.yaml).
#
# The problem it solves: git is our single source of truth, but a plain Secret cannot live in git
# (base64 is an ENCODING, not encryption — one command decodes it). So today five secrets are applied
# by hand and exist nowhere in git: hotel-secret, ghcr-cred, telegram-bot, smtp, MySQL values.
#
# How it works: the controller holds an RSA key pair. `kubeseal` encrypts a Secret with the PUBLIC key
# and produces a SealedSecret — safe to commit, even to a public repo. Only THIS cluster's controller
# holds the private key, so only it can decrypt. It watches SealedSecret objects and materialises a
# normal Secret next to each one. The app never knows anything was encrypted.
#
#   Secret --kubeseal(public key)--> SealedSecret --> git --> controller(private key) --> Secret
#
# ⚠️ The private key is the crown jewel: lose the cluster without a key backup and every SealedSecret
#    in git becomes unreadable (they must be re-sealed from the original values).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    # NOTE: the project lives at github.com/bitnami-labs/sealed-secrets, but the Helm repo is served
    # from bitnami.github.io (no "-labs"). A Helm repo is just an HTTP path holding index.yaml —
    # curl it to check: a 404 there means the URL is wrong, no ArgoCD setting will fix it.
    repoURL: https://bitnami.github.io/sealed-secrets        # Helm chart repo, NOT git
    chart: sealed-secrets
    targetRevision: 2.19.1                                   # CHART version, pinned (controller 0.38.4)
    helm:
      valuesObject:
        # kubeseal looks for a controller named "sealed-secrets-controller" in kube-system by default.
        # Without this override the release would be called "sealed-secrets" and every kubeseal call
        # would need --controller-name.
        fullnameOverride: sealed-secrets-controller
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system      # a cluster-level component, next to the other system controllers
  syncPolicy:
    automated:
      selfHeal: true            # someone deleted the controller -> ArgoCD brings it back
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true    # the SealedSecret CRD is applied server-side
