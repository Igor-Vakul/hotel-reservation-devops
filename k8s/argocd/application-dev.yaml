# ArgoCD Application "hotel-dev" — the DEV environment.
# Tracks the `dev` git branch and deploys the dev overlay into the `hotel-dev` namespace.
# Prod stays in application.yaml (tracks `main`, overlay local, namespace hotel).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotel-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Igor-Vakul/k8s-exam.git
    targetRevision: dev                 # <-- the dev branch (prod app uses main)
    path: k8s/overlays/dev              # <-- the slim dev overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: hotel-dev
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true            # create hotel-dev on first sync
      - ServerSideApply=true            # ServiceMonitor CRD etc.
      # ignoreDifferences below only affects the DIFF. Without this option a sync triggered by any
      # other change would still push the rendered `replicas: 1` and collapse whatever the HPA set.
      - RespectIgnoreDifferences=true

  # spec.replicas of `backend` is owned by the HPA, not by git. Without this, the two fight:
  # HPA scales 1 -> 4 under load, ArgoCD's selfHeal sees "drift from git" and scales back to 1
  # (killing pods mid-request), the HPA scales up again... forever.
  # Rule: a field managed by a controller must not also be declared in git — one owner per field.
  ignoreDifferences:
    - group: apps                       # Deployment lives in the "apps" API group
      kind: Deployment
      name: backend                     # only this one (frontend has no HPA yet)
      jsonPointers:
        - /spec/replicas                # hands this field over to the HPA
