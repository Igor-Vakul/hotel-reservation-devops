# ArgoCD Application — the encrypted secrets that live in git (k8s/sealed/).
#
# Why a separate Application: the `monitoring` namespace is owned by a Helm-chart Application
# (monitoring.yaml), and you cannot slip your own manifests into someone else's chart. These
# SealedSecrets need a git-sourced Application of their own.
#
# The controller (sealed-secrets, kube-system) watches SealedSecret objects and materialises a
# normal Secret next to each one. Nothing else changes: Alertmanager keeps mounting a plain Secret
# and has no idea it arrived encrypted.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Igor-Vakul/k8s-exam.git
    targetRevision: dev             # main is frozen until the demo; promote later
    path: k8s/sealed
  destination:
    server: https://kubernetes.default.svc
    # Default namespace for resources that don't declare one. Ours all carry an explicit
    # namespace (it is part of the seal), so this is only a fallback.
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true                   # a SealedSecret removed from git is removed from the cluster
                                    # (the Secret it produced is garbage-collected with it)
    syncOptions:
      - ServerSideApply=true
