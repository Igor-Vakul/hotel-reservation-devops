# Workflow name — shown in the Actions tab.
name: CI

# Events that trigger this workflow.
on:
  pull_request:        # on any PR
  push:                # on any push

jobs:
  # A job runs on its own fresh runner (VM). Jobs run in parallel unless linked with `needs`.
  backend:
    runs-on: ubuntu-latest        # GitHub-hosted Linux runner
    steps:
      - uses: actions/checkout@v7  # clone the repo into the runner (fresh VM has no code otherwise)
      - uses: actions/setup-dotnet@v5          # install the .NET 10 SDK on the runner
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore backend.Tests/backend.Tests.csproj   # restores backend too (project reference)
      - name: Build
        run: dotnet build backend.Tests/backend.Tests.csproj -c Release --no-restore
      - name: Test
        run: dotnet test backend.Tests/backend.Tests.csproj -c Release --no-build   # xUnit
      - name: Vulnerable packages (report only)
        run: dotnet list backend/backend.csproj package --vulnerable --include-transitive
        continue-on-error: true               # non-blocking: report CVEs but don't fail the job

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend           # all `run:` steps execute in frontend/
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6            # install Node 22 + cache npm
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci                            # clean, lockfile-exact install (deterministic for CI)
      - name: Test
        run: npm test -- --watch=false         # Vitest, one-shot headless
      - name: npm audit (report only)
        run: npm audit --audit-level=high
        continue-on-error: true                # non-blocking

  images:
    needs: [backend, frontend]                 # start only after tests are green
    if: github.event_name == 'push'            # on pushes (not PRs); publish gated to main below
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                          # allow pushing to GHCR with GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - { name: backend, context: backend }
          - { name: frontend, context: frontend }
    env:
      IMAGE: ghcr.io/igor-vakul/hotel-${{ matrix.name }}   # GHCR path must be lowercase
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t $IMAGE:${{ github.sha }} ${{ matrix.context }}
      - name: Trivy scan (report only)
        uses: aquasecurity/trivy-action@master   # prod: pin a release/SHA
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'                        # non-blocking
      # Publish from main (-> :latest, prod) AND dev (-> :dev, dev env). Feature branches/PRs only build+scan.
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push (main -> latest)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:latest
      - name: Push (dev -> dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:dev
          docker push $IMAGE:dev
